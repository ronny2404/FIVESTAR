<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Five Star App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="text-slate-800">

    <div id="syncIndicator" class="fixed top-4 right-4 z-[600] w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>

    <div id="successNotif" class="notif-container">
        <div id="notifBox" class="notif-content notif-success">
            <div class="p-3 rounded-2xl bg-white shadow-sm"><i id="notifIcon" class="fa fa-check-circle text-xl"></i></div>
            <div class="flex-1">
                <p id="notifTitle" class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400">Sistem Info</p>
                <p id="successMsg" class="text-sm font-bold text-slate-700 leading-tight"></p>
            </div>
        </div>
    </div>

    <div class="app-container">
        
        <header class="header-fixed">
            <img src="logo_fivestar.png" alt="Logo" class="logo-img mx-auto">
        </header>

        <main class="content-scrollable">
            
            <div id="loginPage" class="hidden bg-white p-8 rounded-[2.5rem] shadow-xl w-full page-section border border-slate-100 text-center">
                <h1 class="text-3xl font-black text-red-600 uppercase mb-1">FIVE STAR</h1>
                <p class="text-sm font-bold text-yellow-500 uppercase tracking-widest mb-8">Massage & Reflexy</p>
                <div class="space-y-4">
                    <input type="text" id="loginUser" placeholder="Username" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-semibold">
                    <div class="relative">
                        <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <i onclick="togglePass('loginPass', this)" class="fa fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 cursor-pointer p-2 z-20"></i>
                    </div>
                    <button onclick="login()" id="btnLogin" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold uppercase shadow-lg active:scale-95 transition-all">Masuk</button>
                    <p class="text-sm font-semibold text-slate-400 mt-4">Belum ada akun? <span onclick="showPage('registerPage')" class="text-blue-600 font-bold underline cursor-pointer">Daftar</span></p>
                </div>
            </div>

            <div id="registerPage" class="hidden bg-white p-8 rounded-[2.5rem] shadow-xl w-full page-section border border-slate-100">
                <h2 class="text-xl font-black text-slate-800 mb-6 uppercase text-center border-b pb-4">Registrasi</h2>
                <div class="space-y-3">
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2"><label class="text-[9px] font-bold text-slate-400 uppercase">Username</label><input type="text" id="regUser" class="w-full bg-transparent outline-none font-bold text-sm"></div>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2"><label class="text-[9px] font-bold text-slate-400 uppercase">Nama Lengkap</label><input type="text" id="regName" class="w-full bg-transparent outline-none uppercase font-bold text-sm text-blue-600"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2"><label class="text-[9px] font-bold text-slate-400 uppercase">Kelamin</label><select id="regGender" class="w-full bg-transparent outline-none font-bold text-sm"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2"><label class="text-[9px] font-bold text-slate-400 uppercase">Tgl Lahir</label><input type="date" id="regDate" class="w-full bg-transparent outline-none font-bold text-sm text-blue-600"></div>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2"><label class="text-[9px] font-bold text-slate-400 uppercase">Alamat</label><textarea id="regAddress" class="w-full bg-transparent outline-none h-16 text-sm"></textarea></div>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 relative">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Password</label>
                        <input type="password" id="regPass" class="w-full bg-transparent outline-none text-sm">
                        <i onclick="togglePass('regPass', this)" class="fa fa-eye absolute right-4 top-8 text-slate-300 cursor-pointer"></i>
                    </div>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 relative">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Konfirmasi</label>
                        <input type="password" id="regConfirmPass" class="w-full bg-transparent outline-none text-sm">
                        <i onclick="togglePass('regConfirmPass', this)" class="fa fa-eye absolute right-4 top-8 text-slate-300 cursor-pointer"></i>
                    </div>
                    <button onclick="register()" id="btnRegister" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg mt-4 active:scale-95">Daftar Akun</button>
                    <button onclick="showPage('loginPage')" class="w-full text-slate-400 font-bold text-[10px] mt-2 uppercase text-center">Batal</button>
                </div>
            </div>

            <div id="mainPage" class="hidden bg-white p-8 rounded-[2.5rem] shadow-xl w-full text-center page-section border border-slate-100">
                <div class="mb-10"><div id="userAvatar" class="w-20 h-20 bg-blue-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-3xl font-black shadow-lg uppercase">U</div><h2 id="welcomeName" class="text-2xl font-black text-slate-800 uppercase leading-none">USER</h2></div>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="showPage('absenPage')" class="flex items-center justify-between bg-red-500 text-white p-6 rounded-2xl font-bold shadow-lg active:scale-95 transition"><span class="uppercase text-lg"><i class="fa fa-calendar-check-o mr-3"></i> Absensi</span><i class="fa fa-arrow-right opacity-30"></i></button>
                    <button onclick="doLogout()" class="bg-slate-100 text-slate-500 p-5 rounded-2xl font-bold uppercase text-xs active:scale-95 mt-4">Logout</button>
                </div>
            </div>

            <div id="absenPage" class="hidden bg-white p-6 rounded-[2.5rem] shadow-xl w-full page-section text-center">
                <h2 class="text-2xl font-black text-red-600 mb-4 uppercase">Kalender</h2>
                <div class="bg-slate-50 p-4 rounded-3xl border mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <button onclick="changeCalMonth(-1)" class="w-8 h-8 flex items-center justify-center bg-white border rounded-full"><i class="fa fa-chevron-left text-red-500"></i></button>
                        <h3 id="calMonthYear" class="font-black text-slate-700 uppercase text-sm"></h3>
                        <button onclick="changeCalMonth(1)" class="w-8 h-8 flex items-center justify-center bg-white border rounded-full"><i class="fa fa-chevron-right text-red-500"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center border-b pb-2 mb-2 font-black text-[9px] uppercase">
                        <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                    </div>
                    <div id="calGrid" class="grid grid-cols-7 gap-1 text-center"></div>
                </div>
                <button id="btnToggleEditAbsen" onclick="toggleEditAbsenMode()" class="w-full bg-yellow-500 text-white p-4 rounded-2xl shadow-lg uppercase font-black text-sm mb-4 active:scale-95"><i class="fa fa-pencil mr-2"></i> Edit Absen</button>
                <button onclick="showPage('mainPage')" class="w-full text-slate-400 font-bold uppercase text-[10px]">Menu Utama</button>
            </div>

        </main>
    </div>

    <div id="manualAbsenModal" class="hidden fixed inset-0 z-[600] flex items-center justify-center p-6 modal-blur">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 text-center relative border">
            <button onclick="closeManualAbsenModal()" class="absolute top-6 right-6 text-slate-400 p-2"><i class="fa fa-times"></i></button>
            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-3 mb-5 mt-4 text-blue-600 font-black uppercase" id="manualAbsenTargetDate"></div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="submitManualAbsen('Masuk')" class="bg-green-500 text-white p-4 rounded-xl font-bold text-xs uppercase">Masuk</button>
                <button onclick="submitManualAbsen('Off')" class="bg-slate-400 text-white p-4 rounded-xl font-bold text-xs uppercase">Off</button>
                <button onclick="submitManualAbsen('Izin')" class="bg-yellow-500 text-white p-4 rounded-xl font-bold text-xs uppercase">Izin</button>
                <button onclick="submitManualAbsen('Sakit')" class="bg-blue-400 text-white p-4 rounded-xl font-bold text-xs uppercase">Sakit</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
