<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Star 2 - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #39FF14; /* Neon Green */
            --card-bg: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }
        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 10px;
        }
        h1 { font-size: 32px; color: var(--accent-color); margin-bottom: 10px; }
        p { color: var(--text-secondary); margin-bottom: 40px; line-height: 1.5; }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .btn-primary { background-color: var(--accent-color); color: #000; }
        .btn-outline { border: 2px solid var(--accent-color); color: var(--accent-color); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo_fivestar.png" alt="Logo Five Star" class="logo-img">
        <h1>Five Star</h1>
        <p>Akses akun Anda atau daftar baru untuk pengalaman ultra-modern.</p>
        
        <a href="login.html" class="btn btn-primary">Masuk</a>
        <a href="register.html" class="btn btn-outline">Buat Akun</a>
    </div>
</body>
</html>
