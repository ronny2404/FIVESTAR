<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALAMAN UTAMA - SISTEM SUPREME</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        /* Style untuk Logo */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            max-width: 100%;
            height: auto;
            max-height: 150px; /* Batasi tinggi logo biar tidak terlalu besar */
        }
        p { 
            color: #666; 
            margin-bottom: 30px;
            font-size: 18px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-login { 
            background: #4285F4; 
            color: white; 
        }
        .btn-login:hover { 
            background: #3367D6; 
        }
        .btn-about { 
            background: #f0f0f0; 
            color: #333; 
        }
        .btn-about:hover { 
            background: #e0e0e0; 
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- TAMPILAN LOGO GANTI TULISAN SELAMAT DATANG -->
        <div class="logo-container">
            <img src="logo_fivestar.png" alt="Logo Five Star 2">
        </div>

        <p>Sistem Slip Gaji & Absensi Supreme</p>
        
        <a href="login.html" class="btn btn-login">
            <i class="fas fa-sign-in-alt"></i> MASUK / LOGIN
        </a>
        
        <a href="#" class="btn btn-about">
            <i class="fas fa-info-circle"></i> TENTANG APLIKASI
        </a>
    </div>

    <!-- Tambahkan ini kalau mau pakai ikon Font Awesome -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
