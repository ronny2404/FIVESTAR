<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Star 2 - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --accent: #39FF14; --text: #FFFFFF; --text-dim: #B0B0B0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { text-align: center; width: 90%; max-width: 400px; padding: 20px; }
        .logo-img { width: 140px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.3)); }
        h1 { font-size: 36px; color: var(--accent); margin: 0 0 10px 0; font-weight: 700; }
        p { color: var(--text-dim); margin-bottom: 50px; line-height: 1.6; font-size: 16px; }
        .btn { display: block; width: 100%; padding: 18px; border-radius: 30px; font-weight: 700; text-decoration: none; margin-bottom: 15px; font-size: 16px; transition: 0.3s; box-sizing: border-box; text-align: center; }
        .btn-primary { background: var(--accent); color: #000; border: none; }
        .btn-outline { border: 2px solid var(--accent); color: var(--accent); background: transparent; }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo_fivestar.png" alt="Logo" class="logo-img">
        <h1>Five Star</h1>
        <p>Akses akun Anda atau daftar baru untuk pengalaman ultra-modern.</p>
        <a href="login.html" class="btn btn-primary">Masuk</a>
        <a href="register.html" class="btn btn-outline">Buat Akun</a>
    </div>
</body>
</html>
