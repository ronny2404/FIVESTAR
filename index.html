<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Loading - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F5F5F7; --accent: #007AFF; }
        [data-theme="dark"] { --bg: #121212; --accent: #39FF14; }
        body { 
            margin: 0; background: var(--bg); height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-family: 'Inter', sans-serif; overflow: hidden;
        }
        .loader {
            width: 48px; height: 48px;
            border: 5px solid #FFF; border-bottom-color: var(--accent);
            border-radius: 50%; display: inline-block; box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        [data-theme="dark"] .loader { border: 5px solid #333; border-bottom-color: var(--accent); }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } 
        p { margin-top: 20px; font-weight: 600; opacity: 0.6; font-size: 14px; letter-spacing: 1px; color: var(--accent); }
    </style>
</head>
<body>
    <span class="loader"></span>
    <p id="status">LOADING</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const fbConfig = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const auth = getAuth(initializeApp(fbConfig));

        // Terapkan tema terakhir
        document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

        setTimeout(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // JIKA LOGIN: Ambil halaman terakhir atau default ke absensi
                    const lastPage = localStorage.getItem('lastVisitedPage') || 'absensi.html';
                    window.location.replace(lastPage);
                } else {
                    // JIKA TIDAK LOGIN: Masuk ke halaman sambutan
                    window.location.replace("sambutan.html");
                }
            });
        }, 1500); // Animasi loading minimal 1.5 detik agar terlihat smooth
    </script>
</body>
</html>
