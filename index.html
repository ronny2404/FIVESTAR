<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #F5F5F7; 
            --text: #1D1D1F; 
            --accent: #007AFF; 
            --card: #FFFFFF; 
            --border: #E5E5E7; 
        }
        [data-theme="dark"] { 
            --bg: #121212; 
            --text: #FFFFFF; 
            --accent: #39FF14; 
            --card: #1A1A1A; 
            --border: #333; 
        }
        
        /* Kunci Layar: No Scroll & No Zoom */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            touch-action: none; 
            width: 100%;
            position: fixed;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: background 0.3s; 
        }

        /* Toggle Mode Lebih Kecil */
        .theme-header { position: absolute; top: 20px; right: 20px; }
        .theme-toggle { 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 50%; 
            border: 1px solid var(--border); 
            display: flex; 
            background: var(--card); 
            color: var(--text); 
        }
        .theme-toggle i { width: 18px; height: 18px; }

        .container { 
            text-align: center; 
            width: 95%; 
            max-width: 550px; 
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        /* LOGO 500PX & PAS TENGAH */
        .logo-img { 
            width: 500px; 
            max-width: 100%; /* Agar tidak terpotong di layar HP kecil */
            height: auto; 
            display: block; 
            margin: 0 auto 30px auto; 
            transition: 0.5s; 
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.1));
        }
        [data-theme="dark"] .logo-img { 
            filter: drop-shadow(0 0 25px rgba(57, 255, 20, 0.4)); 
        }

        p { 
            opacity: 0.7; 
            margin: 0 0 40px 0; 
            font-size: 15px; 
            line-height: 1.5; 
            max-width: 300px;
        }

        /* Tombol */
        .btn { 
            display: block; 
            width: 100%; 
            max-width: 300px;
            padding: 18px; 
            border-radius: 40px; 
            font-weight: 700; 
            text-decoration: none; 
            margin-bottom: 12px; 
            transition: 0.3s; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 16px; 
        }
        .btn-primary { background: var(--accent); color: #fff; border: none; }
        [data-theme="dark"] .btn-primary { color: #000; }
        .btn-outline { border: 2px solid var(--accent); color: var(--accent); background: transparent; }
        
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="theme-header">
        <div class="theme-toggle" id="themeBtn"><i data-lucide="moon"></i></div>
    </div>

    <div class="container">
        <img src="logo_fivestar.png" alt="Logo" class="logo-img">
        
        <p>Aplikasi Absensi & Kelola Data Karyawan Professional</p>
        
        <a href="login.html" class="btn btn-primary">Masuk</a>
        <a href="register.html" class="btn btn-outline">Daftar Akun</a>
    </div>

    <script>
        const btn = document.getElementById('themeBtn');

        // Fungsi Terapkan Tema (Default Light)
        const applyTheme = (t) => {
            document.body.setAttribute('data-theme', t);
            // Ganti ikon: Jika dark tampilkan matahari, jika light tampilkan bulan
            btn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`;
            lucide.createIcons();
        };

        // Cek Local Storage
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        // Klik Toggle
        btn.onclick = () => {
            const current = document.body.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        };

        lucide.createIcons();
// Tambahkan di bagian paling bawah script index.html
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const fbConfig = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
const auth = getAuth(initializeApp(fbConfig));

onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "dashboard.html"; // Jika sudah login, langsung ke dashboard
    }
});
    </script>
</body>
</html>
