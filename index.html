<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Star 2 - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; }
        [data-theme="dark"] { --bg: #121212; --text: #FFFFFF; --accent: #39FF14; --card: #1E1E1E; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; transition: 0.3s; }
        .container { text-align: center; width: 90%; max-width: 400px; padding: 20px; }
        .logo-img { width: 140px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.2)); }
        h1 { font-size: 36px; color: var(--accent); margin-bottom: 10px; font-weight: 700; }
        p { opacity: 0.7; margin-bottom: 50px; line-height: 1.6; }
        .btn { display: block; width: 100%; padding: 18px; border-radius: 35px; font-weight: 700; text-decoration: none; margin-bottom: 15px; transition: 0.3s; box-sizing: border-box; text-align: center; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }
        [data-theme="dark"] .btn-primary { color: #000; }
        .btn-outline { border: 2px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo_fivestar.png" alt="Logo" class="logo-img">
        <h1>Five Star</h1>
        <p>Akses akun Anda atau daftar baru untuk pengalaman ultra-modern.</p>
        <a href="login.html" class="btn btn-primary">Masuk</a>
        <a href="register.html" class="btn btn-outline">Buat Akun</a>
    </div>
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
