<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Edit Data - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --nav: #FFFFFF; --text: #1D1D1F; --accent: #FF3B30; --card: #FFFFFF; --border: #E5E5E7; }
        [data-theme="dark"] { --bg: #121212; --nav: #181818; --text: #FFFFFF; --accent: #FF453A; --card: #1E1E1E; --border: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--nav); border-bottom: 1px solid var(--border); }
        .container { padding: 20px; padding-bottom: 100px; }
        .data-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .data-info h4 { margin: 0; font-size: 14px; }
        .data-info p { margin: 3px 0 0 0; font-size: 11px; opacity: 0.6; }
        .btn-hapus { background: #FFEBEE; color: #FF3B30; border: none; padding: 10px; border-radius: 12px; cursor: pointer; }
        [data-theme="dark"] .btn-hapus { background: #311; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #888; font-size: 10px; text-decoration: none; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #007AFF; font-weight: 700; }
    </style>
</head>
<body>
    <header><span>Hapus / Edit Data Kerja</span><button onclick="window.location.href='catatan.html'" style="background:none;border:none;color:var(--text);font-weight:700;">Selesai</button></header>
    <div class="container" id="containerData">
        <p style="text-align:center; opacity:0.5;">Memuat data...</p>
    </div>
    <nav class="bottom-nav">
        <a href="absensi.html" class="nav-item"><i data-lucide="calendar"></i><span>Absensi</span></a>
        <a href="catatan.html" class="nav-item active"><i data-lucide="edit-3"></i><span>Catatan</span></a>
        <a href="gaji.html" class="nav-item"><i data-lucide="wallet"></i><span>Gaji</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="user"></i><span>Profil</span></a>
    </nav>

    <script type="module">
        localStorage.setItem('lastVisitedPage', 'edit_data.html');
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app); const db = getFirestore(app);

        async function loadData() {
            const cont = document.getElementById('containerData'); cont.innerHTML = "";
            const q = query(collection(db, "catatan_kerja"), where("uid", "==", auth.currentUser.uid), orderBy("tanggal", "desc"));
            const snap = await getDocs(q);
            if(snap.empty) cont.innerHTML = "<p style='text-align:center;margin-top:50px;opacity:0.5;'>Belum ada data kerja.</p>";
            snap.forEach(d => {
                const data = d.data();
                const card = document.createElement('div'); card.className = "data-card";
                card.innerHTML = `
                    <div class="data-info">
                        <h4>${data.treatment} - ${data.durasi} Jam</h4>
                        <p>${data.tanggal} | ${data.lokasi}</p>
                    </div>
                    <button class="btn-hapus" onclick="hapusData('${d.id}')"><i data-lucide="trash-2" style="width:18px"></i></button>
                `;
                cont.appendChild(card);
            });
            lucide.createIcons();
        }
        window.hapusData = async (id) => {
            if(confirm("Hapus data kerja ini?")) {
                await deleteDoc(doc(db, "catatan_kerja", id)); loadData();
            }
        }
        onAuthStateChanged(auth, (u) => { if(u) loadData(); });
        lucide.createIcons();
    </script>
</body>
</html>
