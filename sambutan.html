<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Selamat Datang - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; }
        [data-theme="dark"] { --bg: #121212; --text: #FFFFFF; --accent: #39FF14; --card: #1A1A1A; --border: #333; }
        html, body { height: 100%; margin: 0; overflow: hidden; position: fixed; width: 100%; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .theme-header { position: absolute; top: 20px; right: 20px; }
        .theme-toggle { cursor: pointer; padding: 6px; border-radius: 50%; border: 1px solid var(--border); display: flex; background: var(--card); }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 90%; max-width: 400px; }
        .logo-img { width: 85%; height: auto; margin-bottom: 30px; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.1)); }
        [data-theme="dark"] .logo-img { filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.3)); }
        p { text-align: center; opacity: 0.7; margin-bottom: 40px; font-size: 15px; }
        .btn { width: 100%; padding: 18px; border-radius: 40px; font-weight: 700; text-decoration: none; display: flex; justify-content: center; background: var(--accent); color: white; font-size: 16px; border: none; }
        [data-theme="dark"] .btn { color: #000; }
        footer { position: absolute; bottom: 20px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="theme-header"><div class="theme-toggle" id="themeBtn"><i data-lucide="moon"></i></div></div>
    <div class="container">
        <img src="logo_fivestar.png" class="logo-img">
        <p>Aplikasi Absensi & Kelola Data Karyawan Professional</p>
        <a href="login.html" class="btn">Lanjutkan</a>
    </div>
    <footer>Project by RONNY</footer>
    <script>
        const btn = document.getElementById('themeBtn');
        const applyTheme = (t) => { document.body.setAttribute('data-theme', t); btn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`; lucide.createIcons(); };
        applyTheme(localStorage.getItem('theme') || 'light');
        btn.onclick = () => { const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', nt); applyTheme(nt); };
        lucide.createIcons();
    </script>
</body>
</html>
