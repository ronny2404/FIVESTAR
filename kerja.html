<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Input Kerja - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --nav: #FFFFFF; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; --sunday: #FF3B30; }
        [data-theme="dark"] { --bg: #121212; --nav: #181818; --text: #FFFFFF; --accent: #39FF14; --card: #1E1E1E; --border: #333; --sunday: #FF453A; }
        
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--nav); }
        header span { font-size: 20px; font-weight: 700; flex: 1; text-align: center; margin-left: 35px; }
        
        .theme-toggle { cursor: pointer; padding: 6px; border-radius: 50%; border: 1px solid var(--border); display: flex; background: var(--bg); color: var(--text); }
        .theme-toggle i { width: 18px; height: 18px; }

        .container { padding: 20px; height: calc(100% - 140px); overflow-y: auto; box-sizing: border-box; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; opacity: 0.6; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; border-radius: 16px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text); font-family: inherit; font-size: 16px; 
            box-sizing: border-box; outline: none; cursor: pointer;
        }

        /* MODAL KALENDER VISUAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { 
            background: var(--card); width: 82%; max-width: 330px; border-radius: 30px; 
            padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); box-sizing: border-box;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        
        /* Nama Hari Minggu Merah */
        .cal-day-name { text-align: center; font-size: 10px; font-weight: 800; opacity: 0.4; padding-bottom: 10px; }
        .cal-day-name.sun { color: var(--sunday); opacity: 1; }
        
        .cal-date { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; border-radius: 50%; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        
        /* Tanggal Minggu Merah */
        .cal-date.sunday { color: var(--sunday) !important; }
        
        .today-border { border-color: var(--text) !important; }
        .locked { opacity: 0.2; pointer-events: none; }
        
        .cal-date.selected { background: var(--accent); color: white !important; border-color: transparent !important; }
        [data-theme="dark"] .cal-date.selected { color: #000 !important; }

        /* BUTTONS */
        .btn-simpan { 
            width: 100%; padding: 18px; background: var(--accent); color: white; 
            border: none; border-radius: 40px; font-weight: 800; font-size: 16px; 
            margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] .btn-simpan { color: #000; }
        
        .btn-batal {
            width: 100%; padding: 15px; background: none; color: var(--text);
            border: none; font-weight: 700; font-size: 15px; margin-top: 10px;
            cursor: pointer; opacity: 0.5;
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { text-align: center; color: #888; font-size: 10px; display: flex; flex-direction: column; align-items: center; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: 700; }
        .nav-item i { width: 22px; height: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <header>
        <span>Input Kerja</span>
        <div class="theme-toggle" id="tBtn"><i data-lucide="moon"></i></div>
    </header>
    
    <div class="container">
        <div class="form-group">
            <label>Tanggal Pelayanan</label>
            <input type="text" id="displayTgl" readonly placeholder="Ketuk untuk pilih tanggal...">
            <input type="hidden" id="inTgl">
        </div>

        <div class="form-group">
            <label>Lokasi Cabang</label>
            <select id="inLoc">
                <option value="FIVE STAR 1">FIVE STAR 1</option>
                <option value="FIVE STAR 2">FIVE STAR 2</option>
            </select>
        </div>

        <div class="form-group">
            <label>Jenis Treatment</label>
            <select id="inTreat"><option value="Massage">Massage</option><option value="Reflexy">Reflexy</option></select>
        </div>

        <div class="form-group">
            <label>Durasi Jam (½ - 10 Jam)</label>
            <select id="inDur"></select>
        </div>

        <div class="form-group">
            <label>Keterangan</label>
            <textarea id="inKet" placeholder="Catatan..."></textarea>
        </div>

        <button class="btn-simpan" id="btnSimpan">Simpan Data Kerja</button>
        <button class="btn-batal" onclick="window.location.href='catatan.html'">Kembali / Batal</button>
    </div>

    <div class="modal" id="calModal">
        <div class="modal-content">
            <div class="cal-header">
                <button onclick="moveMonth(-1)" style="background:none; border:none; color:var(--text); cursor:pointer;"><i data-lucide="chevron-left"></i></button>
                <h3 id="calMonthYear" style="margin:0; font-size:16px; font-weight:800;">...</h3>
                <button onclick="moveMonth(1)" style="background:none; border:none; color:var(--text); cursor:pointer;"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="cal-grid" id="calGrid">
                <div class="cal-day-name sun">M</div><div class="cal-day-name">S</div><div class="cal-day-name">S</div><div class="cal-day-name">R</div><div class="cal-day-name">K</div><div class="cal-day-name">J</div><div class="cal-day-name">S</div>
            </div>
            <button onclick="closeCal()" style="width:100%; margin-top:25px; background:none; border:none; color:var(--accent); font-weight:800; font-size:15px; cursor:pointer;">BATAL</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="absensi.html" class="nav-item"><i data-lucide="calendar"></i><span>Absensi</span></a>
        <a href="catatan.html" class="nav-item active"><i data-lucide="edit-3"></i><span>Catatan</span></a>
        <a href="gaji.html" class="nav-item"><i data-lucide="wallet"></i><span>Gaji</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="user"></i><span>Profil</span></a>
    </nav>

    <script type="module">
        localStorage.setItem('lastVisitedPage', 'kerja.html');
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app); const db = getFirestore(app);

        const selDur = document.getElementById('inDur');
        for (let i = 0.5; i <= 10; i += 0.5) {
            let labelText = i === 0.5 ? "½ Jam" : (i % 1 === 0 ? i + " Jam" : Math.floor(i) + "½ Jam");
            selDur.add(new Option(labelText, i));
        }

        let vDate = new Date();
        const realToday = new Date(); realToday.setHours(0,0,0,0);
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        
        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            const myLabel = document.getElementById('calMonthYear');
            const m = vDate.getMonth(); const y = vDate.getFullYear();
            myLabel.innerText = `${months[m]} ${y}`;
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const headers = grid.querySelectorAll('.cal-day-name');
            grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h));

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';

            for (let d = 1; d <= daysInMonth; d++) {
                const loopDate = new Date(y, m, d); loopDate.setHours(0,0,0,0);
                const box = document.createElement('div');
                
                // CEK APAKAH HARI MINGGU
                const isSunday = loopDate.getDay() === 0;
                box.className = `cal-date ${isSunday ? 'sunday' : ''}`;
                
                if (loopDate.getTime() === realToday.getTime()) box.classList.add('today-border');
                if (loopDate.getTime() > realToday.getTime()) box.classList.add('locked');

                box.innerText = d;
                box.onclick = () => selectDate(d, m, y);
                grid.appendChild(box);
            }
        }

        function selectDate(d, m, y) {
            const fullDate = `${d < 10 ? '0'+d : d}-${(m+1) < 10 ? '0'+(m+1) : (m+1)}-${y}`;
            document.getElementById('displayTgl').value = fullDate;
            document.getElementById('inTgl').value = `${y}-${(m+1) < 10 ? '0'+(m+1) : (m+1)}-${d < 10 ? '0'+d : d}`;
            closeCal();
        }

        window.moveMonth = (dir) => { vDate.setMonth(vDate.getMonth() + dir); renderCalendar(); lucide.createIcons(); };
        window.closeCal = () => document.getElementById('calModal').style.display = 'none';
        document.getElementById('displayTgl').onclick = () => { document.getElementById('calModal').style.display = 'flex'; renderCalendar(); lucide.createIcons(); };

        selectDate(new Date().getDate(), new Date().getMonth(), new Date().getFullYear());

        document.getElementById('btnSimpan').onclick = async () => {
            const user = auth.currentUser;
            const tgl = document.getElementById('inTgl').value;
            if (!tgl) return alert("Pilih tanggal!");
            try {
                await addDoc(collection(db, "catatan_kerja"), {
                    uid: user.uid, nama: user.displayName || "Karyawan",
                    tanggal: tgl, lokasi: document.getElementById('inLoc').value,
                    treatment: document.getElementById('inTreat').value,
                    durasi: parseFloat(selDur.value), keterangan: document.getElementById('inKet').value,
                    createdAt: serverTimestamp()
                });
                localStorage.setItem('lastLocChoice', document.getElementById('inLoc').value);
                alert("Data Kerja Berhasil Disimpan!");
                window.location.href = "catatan.html";
            } catch (err) { alert("Gagal Simpan!"); }
        };

        const tBtn = document.getElementById('tBtn');
        const applyT = (t) => { document.body.setAttribute('data-theme', t); tBtn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`; lucide.createIcons(); };
        applyT(localStorage.getItem('theme') || 'light');
        tBtn.onclick = () => { const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', nt); applyT(nt); };
        lucide.createIcons();
    </script>
</body>
</html>
