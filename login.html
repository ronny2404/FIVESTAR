<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masuk - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; --input: #FFFFFF; }
        [data-theme="dark"] { --bg: #121212; --text: #FFFFFF; --accent: #39FF14; --card: #1A1A1A; --border: #333; --input: #1A1A1A; }
        html, body { height: 100%; margin: 0; overflow: hidden; touch-action: none; width: 100%; position: fixed; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: background 0.3s; }
        input:-webkit-autofill { -webkit-text-fill-color: var(--text) !important; -webkit-box-shadow: 0 0 0px 1000px var(--input) inset !important; }
        .theme-header { position: absolute; top: 15px; right: 15px; }
        .theme-toggle { cursor: pointer; padding: 6px; border-radius: 50%; border: 1px solid var(--border); display: flex; background: var(--input); }
        .theme-toggle i { width: 18px; height: 18px; }
        .form-card { width: 85%; max-width: 350px; }
        .field { margin-bottom: 20px; position: relative; }
        label { display: block; opacity: 0.6; font-size: 13px; margin-bottom: 6px; }
        input { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); font-size: 16px; box-sizing: border-box; }
        .eye-icon { position: absolute; right: 12px; top: 34px; cursor: pointer; color: #888; width: 20px; }
        button { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 35px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        [data-theme="dark"] button { color: #000; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="theme-header"><div class="theme-toggle" id="tBtn"><i data-lucide="moon"></i></div></div>
    <div class="form-card">
        <h2>Masuk</h2>
        <form id="lForm">
            <div class="field"><label>Email</label><input type="email" id="email" required></div>
            <div class="field"><label>Password</label><input type="password" id="pass" required><i data-lucide="eye" class="eye-icon" id="eBtn"></i></div>
            <button type="submit">Masuk</button>
        </form>
        <p style="text-align:center; font-size:14px; opacity:0.7">Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const fbConfig = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const auth = getAuth(initializeApp(fbConfig));
        // REDIRECT JIKA LOGIN
        onAuthStateChanged(auth, (user) => { if (user) window.location.href = "absensi.html"; });
        const pInp = document.getElementById('pass'); const eBtn = document.getElementById('eBtn');
        eBtn.onclick = () => { const isP = pInp.type === 'password'; pInp.type = isP ? 'text' : 'password'; eBtn.setAttribute('data-lucide', isP ? 'eye-off' : 'eye'); lucide.createIcons(); };
        const tBtn = document.getElementById('tBtn');
        const applyT = (t) => { document.body.setAttribute('data-theme', t); tBtn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`; lucide.createIcons(); };
        applyT(localStorage.getItem('theme') || 'light');
        tBtn.onclick = () => { const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', nt); applyT(nt); };
        document.getElementById('lForm').onsubmit = (e) => { e.preventDefault(); signInWithEmailAndPassword(auth, document.getElementById('email').value, pInp.value).then(() => window.location.href="absensi.html").catch(err => alert(err.message)); };
        lucide.createIcons();
    </script>
</body>
</html>
