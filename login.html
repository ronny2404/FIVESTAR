<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body {font-family: Arial,sans-serif; background:#f5f5f5; margin:0; padding:0;}
.container {width:90%; max-width:400px; margin:50px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
h1 {text-align:center; margin-bottom:20px;}
input[type="email"], input[type="password"] {width:100%; padding:10px; margin:10px 0 20px 0; border:1px solid #ccc; border-radius:5px;}
button {width:100%; padding:10px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer;}
button:hover {background:#45a049;}
.link {text-align:center; margin-top:10px;}
.link a {color:#4CAF50; text-decoration:none;}
#message {color:red; text-align:center; margin-bottom:10px;}
</style>
</head>
<body>
<div class="container">
<h1>Login</h1>
<div id="message"></div>
<form id="loginForm">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<div><input type="checkbox" onclick="togglePassword()"> Tampilkan Password</div>
<button type="submit">Login</button>
</form>
<div class="link">
Belum punya akun? <a href="register.html">Register</a>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
  apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ",
  authDomain: "five-star-2404.firebaseapp.com",
  projectId: "five-star-2404",
  storageBucket: "five-star-2404.firebasestorage.app",
  messagingSenderId: "778881784522",
  appId: "1:778881784522:web:6d6d43d6213fdaf4b43233",
  measurementId: "G-Y71EN3MHVW"
};
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        alert('Login berhasil!');
        window.location.href = "dashboard.html";
      })
      .catch((error) => {
        document.getElementById('message').innerText = error.message;
      });
  });
</script>
</body>
</html>
