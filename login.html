<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masuk - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; --input: #FFFFFF; }
        [data-theme="dark"] { --bg: #121212; --text: #FFFFFF; --accent: #39FF14; --card: #1E1E1E; --border: #333; --input: #1A1A1A; }
        html, body { height: 100%; margin: 0; overflow: hidden; width: 100%; position: fixed; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.3s; }
        
        input:-webkit-autofill { -webkit-text-fill-color: var(--text) !important; -webkit-box-shadow: 0 0 0px 1000px var(--input) inset !important; transition: background-color 5000s ease-in-out 0s; }

        /* SAMAKAN TOGGLE DENGAN ABSENSI */
        .theme-header { position: absolute; top: 15px; right: 20px; }
        .theme-toggle { cursor: pointer; padding: 6px; border-radius: 50%; border: 1px solid var(--border); display: flex; background: var(--bg); color: var(--text); }

        .form-card { width: 85%; max-width: 350px; margin-top: -30px; text-align: center; } 
        h2 { font-size: 32px; margin-bottom: 30px; font-weight: 700; text-align: left; }
        .field { margin-bottom: 15px; position: relative; text-align: left; }
        label { display: block; opacity: 0.6; font-size: 13px; margin-bottom: 6px; }
        input { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; padding-right: 45px; color: var(--text); font-size: 16px; box-sizing: border-box; }
        .eye-icon { position: absolute; right: 12px; top: 34px; cursor: pointer; color: #888; width: 22px; height: 22px; z-index: 10; }
        
        button { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 35px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        [data-theme="dark"] button { color: #000; }
        
        .btn-google { background: var(--card); color: var(--text); border: 1px solid var(--border); margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google img { width: 18px; }

        #statusMsg { margin-top: 20px; font-size: 14px; font-weight: 600; color: #ff9500; display: none; }

        p { text-align: center; margin-top: 25px; opacity: 0.7; font-size: 14px; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="theme-header"><div class="theme-toggle" id="tBtn"><i data-lucide="moon"></i></div></div>
    
    <div class="form-card">
        <h2>Masuk</h2>
        <form id="lForm">
            <div class="field"><label>Email</label><input type="email" id="email" required></div>
            <div class="field"><label>Password</label><input type="password" id="pass" required><i data-lucide="eye" class="eye-icon" id="eBtn" onclick="togglePass()"></i></div>

            <div style="text-align: right; margin-bottom: 15px; margin-top: -10px;">
    <a href="lupa-password.html" style="font-size: 13px; opacity: 0.8;">Lupa Password?</a>
</div>

            <button type="submit">Masuk</button>
        </form>

        <button class="btn-google" id="gBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
            Masuk dengan Google
        </button>

        <div id="statusMsg">Memproses Akun...</div>

        <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app); const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const msg = document.getElementById('statusMsg');

        const goDashboard = () => { window.location.href = "absensi.html"; };

        onAuthStateChanged(auth, (u) => { 
            if (u) { msg.style.display = 'block'; msg.innerText = "Berhasil Terhubung! Mengalihkan..."; setTimeout(goDashboard, 800); } 
        });

        document.getElementById('gBtn').onclick = async () => {
            try {
                msg.style.display = 'block'; msg.innerText = "Membuka Pilihan Akun...";
                provider.setCustomParameters({ prompt: 'select_account' });
                const res = await signInWithPopup(auth, provider);
                const s = await getDoc(doc(db, "users", res.user.uid));
                if (!s.exists()) {
                    await setDoc(doc(db, "users", res.user.uid), { nama: res.user.displayName, email: res.user.email, alamat: "-", gender: "-", bd: "", createdAt: new Date() });
                }
                goDashboard();
            } catch (err) {
                console.error(err); msg.style.display = 'none';
                if (err.code === 'auth/popup-blocked') { alert("Pop-up diblokir! Izinkan pop-up di browser Chrome Anda."); } 
                else if (err.code !== 'auth/cancelled-popup-request') { alert("Gagal: " + err.message); }
            }
        };

        document.getElementById('lForm').onsubmit = (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).then(goDashboard).catch(() => alert("Email/Password Salah"));
        };

        window.togglePass = () => {
            const p = document.getElementById('pass'); const e = document.getElementById('eBtn');
            const isP = p.type === 'password'; p.type = isP ? 'text' : 'password';
            e.setAttribute('data-lucide', isP ? 'eye-off' : 'eye'); lucide.createIcons();
        };

        const tBtn = document.getElementById('tBtn');
        const applyT = (t) => { document.body.setAttribute('data-theme', t); tBtn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`; lucide.createIcons(); };
        applyT(localStorage.getItem('theme') || 'light');
        tBtn.onclick = () => { const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', nt); applyT(nt); };
        lucide.createIcons();
    </script>
</body>
</html>
