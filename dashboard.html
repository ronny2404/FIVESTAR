<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FIVE STAR 2</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
        nav { background: #333; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 2rem; text-align: center; }
        button { background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <span>FIVE STAR 2 - Dashboard</span>
        <button id="logoutBtn">Logout</button>
    </nav>

    <div class="content">
        <h1>Selamat Datang, <span id="userEmail">...</span></h1>
        <p>Ini adalah area rahasia khusus pengguna terdaftar.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ",
            authDomain: "five-star-2404.firebaseapp.com",
            projectId: "five-star-2404",
            storageBucket: "five-star-2404.firebasestorage.app",
            messagingSenderId: "778881784522",
            appId: "1:778881784522:web:6d6d43d6213fdaf4b43233",
            measurementId: "G-Y71EN3MHVW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Cek status login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
            } else {
                // Jika tidak ada user, tendang ke login
                window.location.href = "login.html";
            }
        });

        // Fungsi Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
