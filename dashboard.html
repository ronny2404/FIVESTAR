<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --nav: #FFFFFF; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; }
        [data-theme="dark"] { --bg: #121212; --nav: #181818; --text: #FFFFFF; --accent: #39FF14; --card: #1A1A1A; --border: #333; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; transition: 0.3s; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--nav); position: sticky; top: 0; z-index: 10; }
        header span { font-size: 18px; font-weight: 700; }
        
        .theme-toggle { cursor: pointer; padding: 6px; border-radius: 50%; border: 1px solid var(--border); display: flex; background: var(--bg); color: var(--text); }
        .theme-toggle i { width: 18px; height: 18px; }

        .page { padding: 20px; display: none; } 
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .user-name { color: var(--accent); font-weight: 700; font-size: 20px; display: block; }

        /* Pastikan ini sama persis di dashboard.html dan profile.html */
.bottom-nav { 
    position: fixed; 
    bottom: 0; 
    width: 100%; 
    background: var(--nav); 
    display: flex; 
    justify-content: space-around; /* Ini membagi ruang secara merata */
    align-items: center;
    padding: 12px 0; 
    border-top: 1px solid var(--border); 
    z-index: 1000;
    box-sizing: border-box;
}

.nav-item { 
    flex: 1; /* Memberikan lebar yang sama untuk setiap ikon */
    text-align: center; 
    color: #888; 
    font-size: 10px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    text-decoration: none; 
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.nav-item i { 
    width: 20px; 
    height: 20px; 
    margin-bottom: 4px; 
}
    </style>
</head>
<body>

    <header>
        <span id="hn">Dashboard</span>
        <div class="theme-toggle" id="tBtn"><i data-lucide="moon"></i></div>
    </header>

    <div id="absensi" class="page active">
        <div class="card">
            <span id="welcomeName" class="user-name">Halo!</span>
            <p style="font-size: 14px; opacity: 0.7;">Silakan lakukan absensi hari ini di panel Five Star 2.</p>
        </div>
    </div>

    <div id="catatan" class="page"><h2>Catatan</h2><p>Daftar tugas massage & reflexology.</p></div>
    <div id="gaji" class="page"><h2>Gaji</h2><p>Rincian pendapatan Anda.</p></div>
    
    <nav class="bottom-nav">
    <div class="nav-item active" onclick="sw('absensi', this)"><i data-lucide="calendar"></i><span>Absensi</span></div>
    <div class="nav-item" onclick="sw('catatan', this)"><i data-lucide="edit-3"></i><span>Catatan</span></div>
    <div class="nav-item" onclick="sw('gaji', this)"><i data-lucide="wallet"></i><span>Gaji</span></div>
    <a href="profile.html" class="nav-item"><i data-lucide="user"></i><span>Profil</span></a>
</nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", storageBucket: "five-star-2404.firebasestorage.app", messagingSenderId: "778881784522", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app); const db = getFirestore(app);
        
        onAuthStateChanged(auth, async (u) => { 
            if(u) { 
                const s = await getDoc(doc(db, "users", u.uid)); 
                if(s.exists()){ 
                    const d = s.data(); 
                    document.getElementById('hn').innerText = "Halo, "+d.nama.split(' ')[0]; 
                    document.getElementById('welcomeName').innerText = "Selamat Datang, " + d.nama;
                } 
            } else { window.location.href="login.html"; } 
        });

        // Theme Toggle + Local Storage
        const tBtn = document.getElementById('tBtn');
        const applyTheme = (t) => {
            document.body.setAttribute('data-theme', t);
            tBtn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`;
            lucide.createIcons();
        };
        applyTheme(localStorage.getItem('theme') || 'light');
        tBtn.onclick = () => {
            const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', nt);
            applyTheme(nt);
        };

        // Tab Switcher (Khusus Dashboard)
        window.sw = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        lucide.createIcons();
    </script>
</body>
</html>
