<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --nav: #FFFFFF; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; }
        [data-theme="dark"] { --bg: #121212; --nav: #181818; --text: #FFFFFF; --accent: #39FF14; --card: #1E1E1E; --border: #333; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; transition: 0.3s; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--nav); position: sticky; top: 0; z-index: 10; }
        header span { font-size: 24px; font-weight: 700; }
        
        .theme-toggle { cursor: pointer; padding: 10px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; }
        
        .page { padding: 20px; display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .user-email { color: var(--accent); font-weight: 700; margin-bottom: 10px; display: block; }
        .btn-out { background: #FF3B30; color: white; border: none; padding: 18px; width: 100%; border-radius: 35px; font-weight: 700; margin-top: 25px; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { margin-bottom: 4px; }
    </style>
</head>
<body data-theme="dark"> <header>
        <span id="topTitle">Profil</span>
        <div class="theme-toggle" id="themeBtn"><i data-lucide="sun"></i></div>
    </header>

    <div id="absensi" class="page"><h2>Absensi</h2><p>Data kehadiran harian Anda.</p></div>
    <div id="catatan" class="page"><h2>Catatan</h2><p>Daftar tugas Anda.</p></div>
    <div id="gaji" class="page"><h2>Gaji</h2><p>Rincian Gaji bulan ini.</p></div>
    
    <div id="profil" class="page active">
        <div class="card">
            <h1>Profil Saya</h1>
            <span id="uEmail" class="user-email">Memuat...</span>
            <p>Kelola data personal Anda di sini.</p>
            <button id="outBtn" class="btn-out">Keluar</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="sw('absensi', this)"><i data-lucide="calendar"></i><span>Absensi</span></div>
        <div class="nav-item" onclick="sw('catatan', this)"><i data-lucide="edit-3"></i><span>Catatan</span></div>
        <div class="nav-item" onclick="sw('gaji', this)"><i data-lucide="wallet"></i><span>Gaji</span></div>
        <div class="nav-item active" onclick="sw('profil', this)"><i data-lucide="user"></i><span>Profil</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", storageBucket: "five-star-2404.firebasestorage.app", messagingSenderId: "778881784522", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app);
        
        onAuthStateChanged(auth, u => { if(u) document.getElementById('uEmail').innerText = u.email; else window.location.href="login.html"; });
        document.getElementById('outBtn').onclick = () => signOut(auth).then(()=> window.location.href="index.html");

        // Mode Toggle
        const btn = document.getElementById('themeBtn');
        btn.onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = `<i data-lucide="${isDark ? 'moon' : 'sun'}"></i>`;
            lucide.createIcons();
        };

        window.sw = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('topTitle').innerText = id.charAt(0).toUpperCase() + id.slice(1);
        };
        lucide.createIcons();
    </script>
</body>
</html>
