<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profil - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --nav: #FFFFFF; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; --danger: #FF3B30; --input: #FFFFFF; }
        [data-theme="dark"] { --bg: #121212; --nav: #181818; --text: #FFFFFF; --accent: #39FF14; --card: #1E1E1E; --border: #333; --input: #1A1A1A; }
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--nav); }
        .container { padding: 20px; height: calc(100% - 140px); overflow-y: auto; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .info-label { font-size: 11px; opacity: 0.5; font-weight: 700; text-transform: uppercase; margin-top: 10px; }
        .info-value { font-size: 16px; font-weight: 600; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .edit-field { margin-bottom: 15px; }
        .edit-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); font-size: 15px; box-sizing: border-box; }
        .btn { padding: 15px; border-radius: 30px; border: none; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; margin-bottom: 10px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { text-align: center; color: #888; font-size: 10px; display: flex; flex-direction: column; align-items: center; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
    <header><span>Profil</span><div class="theme-toggle" id="tBtn"><i data-lucide="moon"></i></div></header>
    <div class="container">
        <div id="vMode" class="card">
            <div class="info-label">Nama Lengkap</div><div id="pN" class="info-value">Memuat...</div>
            <div class="info-label">Alamat</div><div id="pA" class="info-value">-</div>
            <div class="info-label">Umur</div><div id="pU" class="info-value">-</div>
            <button class="btn btn-primary" id="goEdit">Edit Profil & Alamat</button>
            <button class="btn btn-outline" id="goPass">Ganti Password</button>
            <button class="btn btn-outline" id="oB" style="color:var(--danger)">Logout</button>
        </div>

        <div id="eMode" class="card" style="display:none;">
            <h3>Edit Profil</h3>
            <form id="eF">
                <div class="edit-field"><label>Nama Lengkap</label><input type="text" id="efN" required></div>
                <div class="edit-field"><label>Alamat Lengkap</label><input type="text" id="efA" required></div>
                <div class="edit-field"><label>Tgl Lahir</label><input type="date" id="efB" required></div>
                <div class="edit-field"><label>Gender</label><select id="efG"><option value="L">Pria</option><option value="P">Wanita</option></select></div>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                <button type="button" class="btn btn-outline" onclick="location.reload()">Batal</button>
            </form>
        </div>

        <div id="pMode" class="card" style="display:none;">
            <h3>Ganti Password</h3>
            <form id="pF">
                <div class="edit-field"><label>Password Lama</label><input type="password" id="pOld" required></div>
                <div class="edit-field"><label>Password Baru</label><input type="password" id="pNew" required></div>
                <div class="edit-field"><label>Konfirmasi Password Baru</label><input type="password" id="pConf" required></div>
                <button type="submit" class="btn btn-primary">Update Password</button>
                <button type="button" class="btn btn-outline" onclick="location.reload()">Batal</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="absensi.html" class="nav-item"><i data-lucide="calendar"></i><span>Absensi</span></a>
        <a href="catatan.html" class="nav-item"><i data-lucide="edit-3"></i><span>Catatan</span></a>
        <a href="gaji.html" class="nav-item"><i data-lucide="wallet"></i><span>Gaji</span></a>
        <a href="profile.html" class="nav-item active"><i data-lucide="user"></i><span>Profil</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app); const db = getFirestore(app);
        let uD = null;

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                const s = await getDoc(doc(db, "users", u.uid));
                if (s.exists()) { uD = s.data(); render(); }
            } else { window.location.href = "login.html"; }
        });

        function render() {
            document.getElementById('pN').innerText = uD.nama || "User";
            document.getElementById('pA').innerText = uD.alamat || "-";
            if(uD.bd) { const b = new Date(uD.bd); document.getElementById('pU').innerText = (new Date().getFullYear() - b.getFullYear()) + " Tahun"; }
        }

        document.getElementById('goEdit').onclick = () => {
            document.getElementById('vMode').style.display = 'none';
            document.getElementById('eMode').style.display = 'block';
            document.getElementById('efN').value = uD.nama;
            document.getElementById('efA').value = uD.alamat || "";
            document.getElementById('efB').value = uD.bd || "";
            document.getElementById('efG').value = uD.gender || "L";
        };

        document.getElementById('eF').onsubmit = async (e) => {
            e.preventDefault();
            const up = { ...uD, nama: document.getElementById('efN').value, alamat: document.getElementById('efA').value, bd: document.getElementById('efB').value, gender: document.getElementById('efG').value };
            await setDoc(doc(db, "users", auth.currentUser.uid), up);
            alert("Profil berhasil diperbarui!"); location.reload();
        };

        document.getElementById('goPass').onclick = () => {
            document.getElementById('vMode').style.display = 'none';
            document.getElementById('pMode').style.display = 'block';
        };

        document.getElementById('pF').onsubmit = async (e) => {
            e.preventDefault();
            const oldP = document.getElementById('pOld').value;
            const newP = document.getElementById('pNew').value;
            if (newP !== document.getElementById('pConf').value) return alert("Konfirmasi password tidak cocok!");
            
            const user = auth.currentUser;
            const cred = EmailAuthProvider.credential(user.email, oldP);
            try {
                await reauthenticateWithCredential(user, cred);
                await updatePassword(user, newP);
                alert("Password berhasil diganti!"); location.reload();
            } catch (err) { alert("Gagal: Password lama salah."); }
        };

        document.getElementById('oB').onclick = () => signOut(auth).then(() => window.location.href="index.html");
        document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        const tBtn = document.getElementById('tBtn');
        tBtn.onclick = () => {
            const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', nt); document.body.setAttribute('data-theme', nt); lucide.createIcons();
        };
        lucide.createIcons();
    </script>
</body>
</html>
