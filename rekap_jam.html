<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rekap Jam - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --nav: #FFFFFF; --text: #1D1D1F; --accent: #5856D6; --card: #FFFFFF; --border: #E5E5E7; }
        [data-theme="dark"] { --bg: #121212; --nav: #181818; --text: #FFFFFF; --accent: #7D7AFF; --card: #1E1E1E; --border: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--nav); border-bottom: 1px solid var(--border); }
        .container { padding: 20px; padding-bottom: 100px; }
        .rekap-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-box { background: var(--bg); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-box h4 { margin: 0; font-size: 10px; opacity: 0.6; text-transform: uppercase; }
        .stat-box p { margin: 5px 0 0 0; font-size: 20px; font-weight: 800; color: var(--accent); }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #888; font-size: 10px; text-decoration: none; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #007AFF; font-weight: 700; }
    </style>
</head>
<body>
    <header><span>Rekap Jam Kerja</span><i data-lucide="info" style="width:20px"></i></header>
    <div class="container">
        <div class="month-nav">
            <button onclick="changeMonth(-1)" style="background:none;border:none;color:var(--text)"><i data-lucide="chevron-left"></i></button>
            <h2 id="monthTitle" style="margin:0; font-size:18px">April 2026</h2>
            <button onclick="changeMonth(1)" style="background:none;border:none;color:var(--text)"><i data-lucide="chevron-right"></i></button>
        </div>

        <div class="rekap-card">
            <h3 style="margin:0; font-size:14px; opacity:0.7">Total Hasil Jam</h3>
            <div class="stat-grid">
                <div class="stat-box"><h4>Massage</h4><p id="totalMassage">0</p></div>
                <div class="stat-box"><h4>Reflexy</h4><p id="totalReflexy">0</p></div>
            </div>
            <div class="stat-box" style="margin-top:15px; background:var(--accent); color:white;">
                <h4 style="color:white; opacity:0.8">Gabungan Total</h4>
                <p id="totalAll" style="color:white;">0 Jam</p>
            </div>
        </div>

        <div id="listKerja"></div>
    </div>

    <nav class="bottom-nav">
        <a href="absensi.html" class="nav-item"><i data-lucide="calendar"></i><span>Absensi</span></a>
        <a href="catatan.html" class="nav-item active"><i data-lucide="edit-3"></i><span>Catatan</span></a>
        <a href="gaji.html" class="nav-item"><i data-lucide="wallet"></i><span>Gaji</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="user"></i><span>Profil</span></a>
    </nav>

    <script type="module">
        localStorage.setItem('lastVisitedPage', 'rekap_jam.html');
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb); const auth = getAuth(app); const db = getFirestore(app);

        let vDate = new Date(); const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        async function loadRekap() {
            const m = vDate.getMonth() + 1; const y = vDate.getFullYear();
            document.getElementById('monthTitle').innerText = `${months[m-1]} ${y}`;
            const q = query(collection(db, "catatan_kerja"), where("uid", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            let mTot = 0, rTot = 0;
            snap.forEach(d => {
                const data = d.data(); const dDate = new Date(data.tanggal);
                if(dDate.getMonth()+1 === m && dDate.getFullYear() === y) {
                    if(data.treatment === "Massage") mTot += data.durasi;
                    else rTot += data.durasi;
                }
            });
            document.getElementById('totalMassage').innerText = mTot;
            document.getElementById('totalReflexy').innerText = rTot;
            document.getElementById('totalAll').innerText = (mTot + rTot) + " Jam";
        }
        window.changeMonth = (dir) => { vDate.setMonth(vDate.getMonth()+dir); loadRekap(); };
        onAuthStateChanged(auth, (u) => { if(u) loadRekap(); });
        lucide.createIcons();
    </script>
</body>
</html>
