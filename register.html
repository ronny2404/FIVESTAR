<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #007AFF; --input: #FFFFFF; --border: #E5E5E7; }
        [data-theme="dark"] { --bg: #121212; --text: #FFFFFF; --accent: #39FF14; --input: #1A1A1A; --border: #333; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 0; /* Memberi ruang untuk scroll di layar kecil */
            transition: 0.3s; 
        }

        .form-card { width: 90%; max-width: 400px; }
        h2 { font-size: 32px; margin-bottom: 30px; font-weight: 700; }
        
        .field { margin-bottom: 20px; }
        label { display: block; opacity: 0.7; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
        
        input, select { 
            width: 100%; 
            background: var(--input); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 14px; 
            color: var(--text); 
            box-sizing: border-box; 
            font-size: 15px; 
            transition: 0.3s; 
        }

        input:focus, select:focus { border-color: var(--accent); outline: none; }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 35px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 16px;
        }
        [data-theme="dark"] button { color: black; }

        .row { display: flex; gap: 15px; }
        .row .field { flex: 1; }

        p { text-align: center; opacity: 0.6; margin-top: 30px; font-size: 14px; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Buat Akun</h2>
        <form id="regForm">
            <div class="field">
                <label>Nama Lengkap</label>
                <input type="text" id="fullName" placeholder="Contoh: Ronny Wijaya" required>
            </div>

            <div class="field">
                <label>Username</label>
                <input type="text" id="username" placeholder="username123" required>
            </div>

            <div class="row">
                <div class="field">
                    <label>Tanggal Lahir</label>
                    <input type="date" id="birthDate" required>
                </div>
                <div class="field">
                    <label>Jenis Kelamin</label>
                    <select id="gender" required>
                        <option value="">Pilih</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

            <div class="field">
                <label>Email</label>
                <input type="email" id="remail" placeholder="email@fivestar.com" required>
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="rpass" placeholder="Min. 6 karakter" required>
            </div>

            <div class="field">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirmPass" placeholder="Ulangi password" required>
            </div>

            <button type="submit">Daftar Sekarang</button>
        </form>
        <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", 
            authDomain: "five-star-2404.firebaseapp.com", 
            projectId: "five-star-2404", 
            storageBucket: "five-star-2404.firebasestorage.app", 
            messagingSenderId: "778881784522", 
            appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Deteksi tema sistem
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');

        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('remail').value;
            const pass = document.getElementById('rpass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            // Validasi Password
            if (pass !== confirmPass) {
                alert("Konfirmasi password tidak cocok!");
                return;
            }

            // Di sini kamu bisa mengambil data lain seperti:
            // const name = document.getElementById('fullName').value;
            // const user = document.getElementById('username').value;

            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    alert("Pendaftaran Berhasil!");
                    window.location.href = "dashboard.html";
                })
                .catch(err => alert("Gagal Daftar: " + err.message));
        });
    </script>
</body>
</html>
