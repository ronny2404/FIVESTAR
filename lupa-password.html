<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lupa Password - Five Star 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #007AFF; --card: #FFFFFF; --border: #E5E5E7; --input: #FFFFFF; }
        [data-theme="dark"] { --bg: #121212; --text: #FFFFFF; --accent: #39FF14; --card: #1E1E1E; --border: #333; --input: #1A1A1A; }
        html, body { height: 100%; margin: 0; overflow: hidden; width: 100%; position: fixed; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.3s; }
        
        .theme-header { position: absolute; top: 15px; right: 20px; }
        .theme-toggle { cursor: pointer; padding: 6px; border-radius: 50%; border: 1px solid var(--border); display: flex; background: var(--bg); color: var(--text); }

        .form-card { width: 85%; max-width: 350px; margin-top: -30px; } 
        h2 { font-size: 28px; margin-bottom: 10px; font-weight: 700; }
        p.desc { font-size: 14px; opacity: 0.7; margin-bottom: 25px; line-height: 1.5; }
        
        .field { margin-bottom: 20px; text-align: left; }
        label { display: block; opacity: 0.6; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); font-size: 16px; box-sizing: border-box; }
        
        button { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 35px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        [data-theme="dark"] button { color: #000; }
        
        .back-link { text-align: center; margin-top: 25px; font-size: 14px; opacity: 0.7; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="theme-header"><div class="theme-toggle" id="tBtn"><i data-lucide="moon"></i></div></div>
    
    <div class="form-card">
        <h2>Atur Ulang Password</h2>
        <p class="desc">Masukkan email kamu. Kami akan mengirimkan link untuk mereset password ke email tersebut.</p>
        
        <form id="resetForm">
            <div class="field">
                <label>Email Terdaftar</label>
                <input type="email" id="resetEmail" placeholder="contoh@email.com" required>
            </div>
            <button type="submit" id="btnSubmit">Kirim Link Reset</button>
        </form>
        
        <div class="back-link">
            <a href="login.html">Kembali ke Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const fb = { apiKey: "AIzaSyAsINtnmVQthClAReXRk09k-AsDo9VIqDQ", authDomain: "five-star-2404.firebaseapp.com", projectId: "five-star-2404", appId: "1:778881784522:web:6d6d43d6213fdaf4b43233" };
        const app = initializeApp(fb);
        const auth = getAuth(app);

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('btnSubmit');
            
            btn.innerText = "Mengirim...";
            btn.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Link reset password telah dikirim ke email kamu. Silakan cek kotak masuk atau spam.");
                window.location.href = "login.html";
            } catch (err) {
                alert("Gagal: " + err.message);
                btn.innerText = "Kirim Link Reset";
                btn.disabled = false;
            }
        };

        // UI Theme Logic
        const tBtn = document.getElementById('tBtn');
        const applyT = (t) => {
            document.body.setAttribute('data-theme', t);
            tBtn.innerHTML = `<i data-lucide="${t === 'dark' ? 'sun' : 'moon'}"></i>`;
            lucide.createIcons();
        };
        applyT(localStorage.getItem('theme') || 'light');
        tBtn.onclick = () => {
            const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', nt);
            applyT(nt);
        };
        lucide.createIcons();
    </script>
</body>
</html>
